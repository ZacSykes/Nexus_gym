<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Registro de Usuario | Nexus</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/Registro.css}">
</head>
<body>
<div class="register-container">
  <div class="logo-top">
    <img src="/imagenes/Nexus.png" alt="Logo de Nexus" class="nexus-logo-top">
    <h1 class="logo-name">Nexus</h1>
    <p class="logo-slogan">Conectamos tu entrenamiento</p>
  </div>

  <div class="register-wrapper">
    <div class="register-card">
      <div class="welcome-title">Crear cuenta</div>
      <div class="welcome-sub">Completa tus datos para comenzar</div>

      <!-- ✅ FORMULARIO CON THYMELEAF: action y método correctos -->
      <form th:action="@{/auth/registrar}" th:method="post" id="registerForm">
        
        <!-- Datos personales -->
        <div class="form-section">
          <div class="section-title">
            <i class="fas fa-user-circle"></i>
            <span>Datos personales</span>
          </div>

          <!-- CÉDULA (antes "documento") -->
          <div class="input-group">
            <label class="input-label" for="cedula">Número de cédula</label>
            <input type="text" id="cedula" name="cedula" class="input-field" placeholder="Ej: 1234567890" autocomplete="off" required>
          </div>

          <!-- NOMBRE (primer nombre) -->
          <div class="input-row">
            <div class="input-group half">
              <label class="input-label" for="nombre">Nombre(s)</label>
              <input type="text" id="nombre" name="nombre" class="input-field" placeholder="Ej: Ana María" required>
            </div>
            <div class="input-group half">
              <label class="input-label" for="apellido">Apellido(s)</label>
              <input type="text" id="apellido" name="apellido" class="input-field" placeholder="Ej: García López" required>
            </div>
          </div>

          <!-- TELÉFONO -->
          <div class="input-group">
            <label class="input-label" for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" class="input-field" placeholder="Ej: 3001234567">
          </div>

          <!-- FECHA DE NACIMIENTO (name = fechaNacimiento) -->
          <div class="input-group">
            <label class="input-label" for="fechaNacimiento">Fecha de nacimiento</label>
            <input type="date" id="fechaNacimiento" name="fechaNacimiento" class="input-field">
          </div>

          <!-- DIRECCIÓN (opcional) -->
          <div class="input-group">
            <label class="input-label" for="direccion">Dirección</label>
            <input type="text" id="direccion" name="direccion" class="input-field" placeholder="Ej: Calle 123 #45-67">
          </div>

          <!-- GÉNERO (opcional) -->
          <div class="input-group">
            <label class="input-label" for="genero">Género</label>
            <select id="genero" name="genero" class="input-field">
              <option value="">Seleccionar</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>

        <!-- Datos de cuenta -->
        <div class="form-section">
          <div class="section-title">
            <i class="fas fa-envelope"></i>
            <span>Datos de cuenta</span>
          </div>

          <div class="input-group">
            <label class="input-label" for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" class="input-field" placeholder="Ej: ana@email.com" autocomplete="email" required>
          </div>

          <div class="input-row">
            <div class="input-group half">
              <label class="input-label" for="password">Contraseña</label>
              <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required>
              <span class="password-hint">Mínimo 6 caracteres</span>
            </div>
            <div class="input-group half">
              <label class="input-label" for="confirmarPassword">Confirmar contraseña</label>
              <input type="password" id="confirmarPassword" name="confirmarPassword" class="input-field" placeholder="••••••••" required>
            </div>
          </div>
        </div>

        <!-- Selección de gimnasio (opcional - se guarda en otra tabla si la creas) -->
        <div class="form-section">
          <div class="section-title">
            <i class="fas fa-dumbbell"></i>
            <span>Gimnasio (opcional)</span>
          </div>
          <div class="input-group">
            <label class="input-label" for="gimnasio">Gimnasio al que perteneces</label>
            <select id="gimnasio" class="input-field">
              <option value="">-- Selecciona un gimnasio --</option>
              <!-- Los gimnasios se cargan con JS, pero no se envía al backend aún -->
            </select>
            <span class="field-hint">Por ahora solo informativo</span>
          </div>
        </div>

        <!-- Términos y condiciones -->
        <div class="terms-section">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="termsCheck" required>
            <span>Acepto los <a href="#" id="termsLink">términos y condiciones</a></span>
          </label>
        </div>

        <button type="submit" class="register-btn-main">
          <i class="fas fa-user-plus"></i> Registrarme
        </button>
      </form>

      <div class="login-section">
        <div class="divider">
          <span>¿Ya tienes una cuenta?</span>
        </div>
        <button th:href="@{/auth/login}" id="loginBtn" class="login-redirect-btn">
          <i class="fas fa-sign-in-alt"></i> Iniciar sesión
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // Carga de gimnasios (solo visual, no afecta el registro)
  const gimnasios = [
    { id: 1, nit: "900123456-1", nombre: "Fitness Center Premium" },
    { id: 2, nit: "900123456-2", nombre: "Power Gym Elite" },
    // ... (todos los que tenías)
  ];

  const gimnasioSelect = document.getElementById('gimnasio');
  gimnasios.forEach(gym => {
    const option = document.createElement('option');
    option.value = gym.id;
    option.textContent = `${gym.nombre} (NIT: ${gym.nit})`;
    gimnasioSelect.appendChild(option);
  });

  // Validación extra antes de enviar (opcional, pero el backend también valida)
  const form = document.getElementById('registerForm');
  form.addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmarPassword').value;
    if (password !== confirm) {
      e.preventDefault();
      alert('❌ Las contraseñas no coinciden');
      return false;
    }
    if (password.length < 6) {
      e.preventDefault();
      alert('❌ La contraseña debe tener al menos 6 caracteres');
      return false;
    }
    if (!document.getElementById('termsCheck').checked) {
      e.preventDefault();
      alert('✧ Debes aceptar los términos y condiciones');
      return false;
    }
    // Si todo ok, el formulario se envía normalmente al backend
  });

  // Redirigir al login
  document.getElementById('loginBtn').addEventListener('click', () => {
    window.location.href = '/auth/login';
  });

  document.getElementById('termsLink').addEventListener('click', (e) => {
    e.preventDefault();
    alert('📜 Términos y condiciones de Nexus Gym...');
  });
</script>
</body>
</html>
