<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña | Nexus</title>

<link rel="stylesheet" th:href="@{/css/olvidar.css}">

</head>

<body>

<div class="container">

    <div class="card">

        <h2>Recuperar contraseña</h2>

        <p class="descripcion">
            Si los datos son correctos, recibirás un enlace para restablecer tu contraseña.
        </p>

        <!-- MENSAJES -->
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${mensaje}" class="alert-success" th:text="${mensaje}"></div>

        <!-- FORMULARIO -->
        <form th:action="@{/recuperar-password}" method="post" autocomplete="off">

            <input type="email"
                name="email"
                placeholder="Correo electrónico"
                required>

            <input type="text"
                name="cedula"
                placeholder="Cédula"
                pattern="[0-9]+"
                title="Solo números"
                required>

            <button type="submit"
                    onclick="this.disabled=true; this.form.submit();">
                Enviar enlace
            </button>

        </form>

        <!-- VOLVER -->
        <a th:href="@{/login}" class="volver">← Volver al login</a>

    </div>

</div>

</body>
</html>
