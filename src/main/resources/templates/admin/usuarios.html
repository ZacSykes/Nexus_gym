<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .usuario-panel {
            border: 1px solid rgba(124, 58, 237, 0.35);
            background: linear-gradient(160deg, rgba(18, 18, 30, 0.92), rgba(26, 26, 46, 0.94));
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0 24px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-8px);
            pointer-events: none;
            transition: max-height 0.35s ease, opacity 0.25s ease, transform 0.25s ease;
        }

        .usuario-panel.open {
            max-height: 800px;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .usuario-panel h2 {
            margin: 0 0 14px;
            font-size: 1.2rem;
            color: #F9FAFB;
        }

        .usuario-helper {
            grid-column: 1 / -1;
            font-size: 0.86rem;
            color: #9CA3AF;
            margin-top: -4px;
        }

        .usuario-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        .usuario-form input,
        .usuario-form select {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid rgba(124, 58, 237, 0.28);
            background: rgba(18, 18, 30, 0.82);
            color: #F9FAFB;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .usuario-form input::placeholder {
            color: #9CA3AF;
        }

        .usuario-form input:focus,
        .usuario-form select:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
            transform: translateY(-1px);
        }

        .usuario-form select option {
            color: #F9FAFB;
            background: #1A1A2E;
        }

        .usuario-form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .btn-cancelar-form {
            background: transparent;
            color: #C4B5FD;
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 40px;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .btn-cancelar-form:hover {
            background: rgba(124, 58, 237, 0.14);
            color: #F9FAFB;
            transform: translateY(-1px);
        }

        .usuarios-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .btn-exportar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(18, 18, 30, 0.8);
            color: #F9FAFB;
            border: 1px solid rgba(124, 58, 237, 0.35);
            border-radius: 40px;
            padding: 12px 18px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .btn-exportar:hover {
            background: rgba(124, 58, 237, 0.14);
            color: #F9FAFB;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div th:replace="~{admin/fragments/navbar :: navbarAdmin}"></div>

    <div class="main-layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/fragments/sidebar :: sidebarAdmin}"></div>

        <!-- CONTENIDO -->
        <main class="main-content">

            <h1>Gestión de Usuarios</h1>

            <!-- MENSAJES -->
            <div th:if="${error}" class="alert-error" th:text="${error}"></div>
            <div th:if="${mensaje}" class="alert-success" th:text="${mensaje}"></div>

            <div class="filtro">
                <form class="filtro-wrapper" th:action="@{/admin/usuarios}" method="get">
                    <input
                        id="searchInput"
                        name="fil"
                        type="text"
                        th:value="${fil}"
                        placeholder="Buscar por cédula, nombre, apellido, correo, teléfono o rol"
                    >
                    <button id="searchButton" type="submit" class="btn-buscar">Buscar</button>
                </form>
            </div>

            <div class="usuarios-actions">
                <button type="button" class="btn-crear" id="btnMostrarCrearUsuario">Crear Usuario</button>
                <a th:href="@{/admin/usuarios/exportar(fil=${fil})}" class="btn-exportar">Descargar Excel</a>
            </div>

            <section id="panelCrearUsuario" class="usuario-panel"
                     th:classappend="${error != null} ? ' open'">
                <h2 id="tituloFormularioUsuario">Nuevo Usuario</h2>

                <form id="usuarioForm" th:action="@{/admin/guardar}" method="post"
                      class="usuario-form">

                    <input type="hidden" name="id" id="usuarioId">

                          <input type="text" name="nombre" id="usuarioNombre" placeholder="Nombre"
                              minlength="2" maxlength="60"
                              pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñÜü]+(?:\s+[A-Za-zÁÉÍÓÚáéíóúÑñÜü]+)*$"
                              title="Solo letras y espacios (2-60 caracteres)" required>
                          <input type="text" name="apellido" id="usuarioApellido" placeholder="Apellido"
                              minlength="2" maxlength="60"
                              pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñÜü]+(?:\s+[A-Za-zÁÉÍÓÚáéíóúÑñÜü]+)*$"
                              title="Solo letras y espacios (2-60 caracteres)" required>
                          <input type="text" name="documento" id="usuarioDocumento" placeholder="Cédula"
                              inputmode="numeric" maxlength="12" pattern="^\d{6,12}$"
                              title="Debe tener entre 6 y 12 dígitos" required>
                          <input type="email" name="email" id="usuarioEmail" placeholder="Correo" maxlength="254" required>
                          <input type="text" name="telefono" id="usuarioTelefono" placeholder="Teléfono"
                              inputmode="numeric" maxlength="10" pattern="^3\d{9}$"
                              title="Debe tener 10 dígitos e iniciar por 3" required>
                    <select name="rol" id="usuarioRol" required>
                        <option value="">Seleccione un rol</option>
                        <option value="USUARIO">Usuario</option>
                        <option value="INSTRUCTOR">Instructor</option>
                        <option value="ADMIN">Administrador</option>
                    </select>
                          <input type="password" name="password" id="usuarioPassword" placeholder="Contraseña" minlength="8"
                              pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,72}$"
                              title="8-72 caracteres con mayúscula, minúscula, número y símbolo" required>
                    <div class="usuario-helper" id="usuarioPasswordHint">Mínimo 8 caracteres.</div>

                    <div class="usuario-form-actions">
                        <button type="submit" class="btn-crear" id="btnGuardarUsuario">Guardar Usuario</button>
                        <button type="button" class="btn-cancelar-form" id="btnCancelarCrearUsuario">Cancelar</button>
                    </div>
                </form>
            </section>

            <!-- TABLA -->
            <table>

                <thead>
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.documento}"></td>
                        <td th:text="${usuario.nombre}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td th:text="${usuario.rol}"></td>

                        <!-- ACCIONES -->
                                                <td class="acciones">

                                                        <button type="button" class="btn-editar"
                                                                th:attr="
                                                                    data-id=${usuario.id},
                                                                    data-nombre=${usuario.nombre},
                                                                    data-apellido=${usuario.apellido},
                                                                    data-documento=${usuario.documento},
                                                                    data-email=${usuario.email},
                                                                    data-telefono=${usuario.telefono},
                                                                    data-rol=${usuario.rol}"
                                                                onclick="abrirModalEditar(this)">Editar</button>

                            <form th:action="@{/admin/eliminar/{id}(id=${usuario.id})}"
                                                                    style="display:inline;"
                                  method="post">
                                                                <button type="submit" class="btn-eliminar">Eliminar</button>
                            </form>

                        </td>

                    </tr>
                </tbody>

            </table>

        </main>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footerGlobal}"></div>

<script>
const btnMostrarCrearUsuario = document.getElementById('btnMostrarCrearUsuario');
const panelCrearUsuario = document.getElementById('panelCrearUsuario');
const btnCancelarCrearUsuario = document.getElementById('btnCancelarCrearUsuario');
const usuarioForm = document.getElementById('usuarioForm');
const tituloFormularioUsuario = document.getElementById('tituloFormularioUsuario');
const usuarioId = document.getElementById('usuarioId');
const usuarioNombre = document.getElementById('usuarioNombre');
const usuarioApellido = document.getElementById('usuarioApellido');
const usuarioDocumento = document.getElementById('usuarioDocumento');
const usuarioEmail = document.getElementById('usuarioEmail');
const usuarioTelefono = document.getElementById('usuarioTelefono');
const usuarioRol = document.getElementById('usuarioRol');
const usuarioPassword = document.getElementById('usuarioPassword');
const usuarioPasswordHint = document.getElementById('usuarioPasswordHint');
const btnGuardarUsuario = document.getElementById('btnGuardarUsuario');

const URL_CREAR = '/admin/guardar';
const URL_EDITAR = '/admin/editar';

function soloLetrasYEspacios(valor) {
    return valor
        .replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñÜü\s]/g, '')
        .replace(/\s{2,}/g, ' ')
        .replace(/^\s+/, '');
}

function soloDigitos(valor) {
    return valor.replace(/\D/g, '');
}

function normalizarRolParaSelect(rol) {
    if (!rol) return '';
    const valor = String(rol).trim().toUpperCase();

    if (valor === 'ROLE_ADMINISTRADOR' || valor === 'ADMIN') return 'ADMIN';
    if (valor === 'ROLE_INSTRUCTOR' || valor === 'INSTRUCTOR') return 'INSTRUCTOR';
    if (valor === 'ROLE_USUARIO' || valor === 'USUARIO') return 'USUARIO';

    return '';
}

function activarModoCrear() {
    if (!usuarioForm) return;
    usuarioForm.action = URL_CREAR;
    usuarioForm.reset();

    usuarioId.value = '';
    usuarioDocumento.readOnly = false;
    usuarioDocumento.required = true;
    usuarioRol.value = '';
    usuarioRol.required = true;

    usuarioPassword.value = '';
    usuarioPassword.required = true;
    usuarioPassword.placeholder = 'Contraseña';

    tituloFormularioUsuario.textContent = 'Nuevo Usuario';
    usuarioPasswordHint.textContent = 'Mínimo 8 caracteres.';
    btnGuardarUsuario.textContent = 'Guardar Usuario';
    btnMostrarCrearUsuario.textContent = 'Crear Usuario';
}

function activarModoEditar(btn) {
    if (!btn || !usuarioForm) return;

    usuarioForm.action = URL_EDITAR;
    usuarioId.value = btn.dataset.id || '';
    usuarioNombre.value = btn.dataset.nombre || '';
    usuarioApellido.value = btn.dataset.apellido || '';
    usuarioDocumento.value = btn.dataset.documento || '';
    usuarioEmail.value = btn.dataset.email || '';
    usuarioTelefono.value = btn.dataset.telefono || '';
    usuarioRol.value = normalizarRolParaSelect(btn.dataset.rol);

    usuarioDocumento.readOnly = true;
    usuarioPassword.value = '';
    usuarioPassword.required = false;
    usuarioPassword.placeholder = 'Nueva contraseña (opcional)';

    tituloFormularioUsuario.textContent = 'Editar Usuario';
    usuarioPasswordHint.textContent = 'Déjalo en blanco para mantener la contraseña actual.';
    btnGuardarUsuario.textContent = 'Actualizar Usuario';
    btnMostrarCrearUsuario.textContent = 'Ocultar Formulario';
    panelCrearUsuario.classList.add('open');
}

if (btnMostrarCrearUsuario && panelCrearUsuario) {
    btnMostrarCrearUsuario.addEventListener('click', () => {
        const abierto = panelCrearUsuario.classList.contains('open');
        if (abierto) {
            panelCrearUsuario.classList.remove('open');
            activarModoCrear();
            return;
        }

        activarModoCrear();
        panelCrearUsuario.classList.add('open');
        btnMostrarCrearUsuario.textContent = 'Ocultar Formulario';
    });
}

if (panelCrearUsuario && panelCrearUsuario.classList.contains('open')) {
    btnMostrarCrearUsuario.textContent = 'Ocultar Formulario';
}

if (btnCancelarCrearUsuario && panelCrearUsuario && btnMostrarCrearUsuario) {
    btnCancelarCrearUsuario.addEventListener('click', () => {
        panelCrearUsuario.classList.remove('open');
        activarModoCrear();
    });
}

if (usuarioForm) {
    usuarioForm.addEventListener('submit', (event) => {
        if (!usuarioForm.checkValidity()) {
            event.preventDefault();
            panelCrearUsuario.classList.add('open');
            btnMostrarCrearUsuario.textContent = 'Ocultar Formulario';
            usuarioForm.reportValidity();
        }
    });
}

if (usuarioNombre) {
    usuarioNombre.addEventListener('input', () => {
        usuarioNombre.value = soloLetrasYEspacios(usuarioNombre.value);
    });
}

if (usuarioApellido) {
    usuarioApellido.addEventListener('input', () => {
        usuarioApellido.value = soloLetrasYEspacios(usuarioApellido.value);
    });
}

if (usuarioDocumento) {
    usuarioDocumento.addEventListener('input', () => {
        usuarioDocumento.value = soloDigitos(usuarioDocumento.value).slice(0, 12);
    });
}

if (usuarioTelefono) {
    usuarioTelefono.addEventListener('input', () => {
        usuarioTelefono.value = soloDigitos(usuarioTelefono.value).slice(0, 10);
    });
}

/* ================== MODAL EDITAR ================== */
function abrirModalEditar(boton) {
    activarModoEditar(boton);
}

/* ================== FILTRO (SI EXISTE) ================== */
const searchBtn = document.getElementById('searchButton');
const searchInput = document.getElementById('searchInput');

if (searchBtn && searchInput) {
    searchBtn.addEventListener('click', () => {
        const searchValue = searchInput.value.trim();
        if (searchValue) {
            window.location.href = '/admin/usuarios?fil=' + encodeURIComponent(searchValue);
        } else {
            window.location.href = '/admin/usuarios';
        }
    });

    searchInput.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            searchBtn.click();
        }
    });
}
</script>

</body>
</html>
