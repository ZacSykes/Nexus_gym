<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Pagos</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
  </head>
  <body>
    <div th:replace="~{admin/fragments/navbar :: navbarAdmin}"></div>

    <div class="main-layout">
      <div th:replace="~{admin/fragments/sidebar :: sidebarAdmin}"></div>

      <main class="main-content">
        <h1>Gestión de Pagos</h1>

        <!-- ==================== BUSCAR USUARIO ==================== -->
        <section class="card">
          <h2>Buscar Usuario</h2>

          <form th:action="@{/admin/pagos/buscar}" method="get">
            <input
              type="text"
              name="cedula"
              placeholder="Ingrese cédula"
              required
            />
            <button type="submit">Buscar</button>
          </form>
        </section>

        <!-- ==================== DATOS USUARIO ==================== -->
        <section class="card" th:if="${usuario != null}">
          <h2>Datos del Usuario</h2>

          <p>
            <strong>Nombre:</strong> <span th:text="${usuario.nombre}"></span>
          </p>
          <p>
            <strong>Apellido:</strong>
            <span th:text="${usuario.apellido}"></span>
          </p>
          <p>
            <strong>Correo:</strong> <span th:text="${usuario.correo}"></span>
          </p>
          <p>
            <strong>Dirección:</strong>
            <span th:text="${usuario.direccion}"></span>
          </p>

          <!-- ==================== CREAR PAGO ==================== -->
          <h3>Asignar Plan</h3>

          <form th:action="@{/admin/pagos/crear}" method="post">
            <input
              type="hidden"
              name="usuarioId"
              th:value="${usuario.idUsuario}"
            />

            <label>Seleccionar Plan:</label>
            <select name="planId" required>
              <option value="">-- Seleccione --</option>
              <option
                th:each="plan : ${planes}"
                th:value="${plan.idPlanes}"
                th:text="${plan.nombre + ' - $' + plan.precio}"
              ></option>
            </select>

            <button type="submit">Registrar Pago</button>
          </form>
        </section>

        <!-- ==================== TABLA PAGOS ==================== -->
        <section class="card">
          <h2>Historial de Pagos</h2>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Monto</th>
                <th>Estado</th>
                <th>Metodo</th>
                <th>Referencia</th>
                <th>Fecha</th>
                <th>Factura</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${pagos == null or #lists.isEmpty(pagos)}">
                <td colspan="7">No hay pagos registrados</td>
              </tr>

              <tr th:each="pago : ${pagos}">
                <td th:text="${pago.idPago}"></td>
                <td
                  th:text="${pago.usuario != null ? pago.usuario.nombre + ' ' + pago.usuario.apellido : 'N/A'}"
                ></td>
                <td th:text="${pago.monto}"></td>
                <td th:text="${pago.estado}"></td>
                <td th:text="${pago.metodoPago}"></td>
                <td th:text="${pago.referencia}"></td>
                <td
                  th:text="${#temporals.format(pago.fechaPago, 'dd/MM/yyyy HH:mm')}"
                ></td>
                <td>
                  <a th:href="@{/admin/pagos/factura/{id}(id=${pago.idPago})}">
                    Descargar PDF
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <div th:replace="~{fragments/footer :: footerGlobal}"></div>
  </body>
</html>
