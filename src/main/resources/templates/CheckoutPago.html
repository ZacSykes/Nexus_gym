<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Finalizar Compra</title>
    <link rel="stylesheet" th:href="@{/css/Paquetes.css}">
</head>

<body>

    <video autoplay muted loop class="video-bg">
        <source th:src="@{/Videos/FondoL.mp4}" type="video/mp4">
    </video>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo-nav">
                <button class="menu-toggle">☰</button>
                <img th:src="@{/imagenes/Login.png}" alt="Nexus Logo">
                <span class="logo-text">NEXUS</span>
            </div>

            <div class="nav-actions">
                <div class="user-menu">

                    <!-- AVATAR SEGURO -->
                    <img 
                    th:src="${usuario != null} ? 
                    @{'https://ui-avatars.com/api/?background=7b00ff&color=fff&bold=true&size=40&name=' + usuario.nombre + '+' + usuario.apellido} 
                    : @{'/imagenes/default.png'}"
                    alt="Avatar" class="avatar">

                    <div class="user-info">
                        <span class="user-name"
                        th:text="${usuario != null ? usuario.nombre + ' ' + usuario.apellido : 'Usuario'}">
                        </span>
                    </div>

                    <!-- LOGOUT SEGURO -->
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="logout-btn">🚪 Salir</button>
                    </form>

                </div>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <main class="main-content">

            <!-- VALIDACIÓN PLAN -->
            <div th:if="${plan == null}" class="alert-error">
                <p>Error: No se encontró el plan seleccionado.</p>
                <a th:href="@{/paquetes}">Volver</a>
            </div>

            <div th:if="${plan != null}">

                <div class="section-header">
                    <h1>💳 Finalizar Compra</h1>
                    <p>Revisa los detalles y elige tu método de pago</p>
                </div>

                <div class="checkout-container">

                    <!-- RESUMEN -->
                    <div class="resumen-pedido">
                        <h2>Resumen del pedido</h2>

                        <div class="plan-detalle">
                            <span class="plan-nombre"
                            th:text="${plan.nombre != null ? plan.nombre : 'Plan'}"></span>

                            <span class="plan-precio"
                            th:text="${plan.precio != null ? '$' + #numbers.formatDecimal(plan.precio, 0, 'COMMA', 0, 'POINT') : '$0'}">
                            </span>
                        </div>

                        <div class="plan-info">
                            <span th:text="${plan.totalClases != null ? plan.totalClases + ' clases' : ''}"></span>
                            <span th:text="${plan.duracionDias != null ? 'Válido por ' + plan.duracionDias + ' días' : ''}"></span>
                            <span th:text="${plan.personas != null ? 'Para ' + plan.personas + ' persona(s)' : ''}"></span>
                        </div>

                        <div class="total">
                            <strong>Total a pagar:</strong>
                            <strong th:text="${plan.precio != null ? '$' + #numbers.formatDecimal(plan.precio, 0, 'COMMA', 0, 'POINT') : '$0'}"></strong>
                        </div>
                    </div>

                    <!-- FORMULARIO -->
                    <form th:action="@{/pago/procesar}" method="post" class="form-pago">

                        <!-- 🔐 CSRF -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <!-- 🔥 ID SEGURO -->
                        <input type="hidden" name="idPlan" 
                               th:value="${plan.idPlanes != null ? plan.idPlanes : 0}">

                        <!-- MÉTODOS -->
                        <div class="metodos-pago">
                            <h2>Método de pago</h2>

                            <div class="metodo-option">
                                <input type="radio" name="metodoPago" value="Tarjeta" required>
                                <label>💳 Tarjeta de crédito/débito</label>
                            </div>

                            <div class="metodo-option">
                                <input type="radio" name="metodoPago" value="Transferencia">
                                <label>🏦 Transferencia bancaria</label>
                            </div>

                            <div class="metodo-option">
                                <input type="radio" name="metodoPago" value="Nequi">
                                <label>📱 Nequi / Daviplata</label>
                            </div>

                            <div class="metodo-option">
                                <input type="radio" name="metodoPago" value="Efectivo">
                                <label>💵 Efectivo en academia</label>
                            </div>

                        </div>

                        <!-- REFERENCIA -->
                        <div class="campo-referencia">
                            <label>Referencia (opcional):</label>
                            <input type="text" name="referencia"
                                   placeholder="Ej: Nequi 311xxx, consignación #1234">
                        </div>

                        <!-- BOTONES -->
                        <div class="botones">
                            <button type="submit" class="btn-pagar">✅ Confirmar y pagar</button>
                            <a th:href="@{/paquetes}" class="btn-cancelar">Cancelar</a>
                        </div>

                    </form>

                </div>

            </div>

        </main>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <p>© 2026 <strong>Nexus</strong>. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>
</html>
