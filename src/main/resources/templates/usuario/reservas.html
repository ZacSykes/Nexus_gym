<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Mis Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/MisReservas.css}">
</head>

<body>

    <!-- NAVBAR (fragmento) -->
    <div th:replace="usuario/fragments/navbar :: navbarUsuario"></div>

    <div class="main-layout" th:if="${usuario != null}">

        <!-- SIDEBAR (fragmento) -->
        <div th:replace="usuario/fragments/sidebar :: sidebarUsuario"></div>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">

            <!-- Mensajes de alerta -->
            <div th:if="${mensaje}" class="alert-message" th:classappend="${tipo == 'exito'} ? 'alert-exito' : 'alert-error'">
                <i th:if="${tipo == 'exito'}" class="fas fa-check-circle"></i>
                <i th:unless="${tipo == 'exito'}" class="fas fa-exclamation-triangle"></i>
                <span th:text="${mensaje}"></span>
            </div>

            <!-- Encabezado -->
            <div class="page-header">
                <h1><i class="fas fa-calendar-alt"></i> Mis Reservas</h1>
                <p>Gestiona tus clases agendadas</p>
            </div>

            <!-- Tarjeta resumen -->
            <div class="summary-card">
                <div class="summary-icon">
                    <i class="fas fa-ticket-alt"></i>
                </div>
                <div class="summary-info">
                    <span class="summary-label">Total de reservas</span>
                    <strong class="summary-number" th:text="${#lists.size(reservas)}">0</strong>
                </div>
            </div>

            <!-- Lista de reservas -->
            <div th:if="${not #lists.isEmpty(reservas)}" class="reservas-grid">
                <div th:each="reserva : ${reservas}" class="reserva-card" data-reserva-id="${reserva.idReserva}">
                    <div class="reserva-header">
                        <h3 th:text="${reserva.clase.nombre}">Clase de Boxeo</h3>
                        <span class="reserva-status" 
                              th:classappend="${reserva.estado == 'Confirmada'} ? 'status-confirmada' : 'status-cancelada'"
                              th:text="${reserva.estado}">Confirmada</span>
                    </div>
                    <div class="reserva-body">
                        <div class="reserva-info">
                            <i class="fas fa-user-coach"></i>
                            <span>Coach: <strong th:text="${reserva.clase.profesor.nombre}">Carlos Martínez</strong></span>
                        </div>
                        <div class="reserva-info">
                            <i class="fas fa-calendar-day"></i>
                            <span th:text="${#temporals.format(reserva.fechaClase, 'dd/MM/yyyy')}">15/04/2025</span>
                        </div>
                        <div class="reserva-info">
                            <i class="fas fa-clock"></i>
                            <span th:text="${reserva.clase.horaInicio}">18:00</span>
                        </div>
                    </div>
                    <form th:action="@{/usuario/cancelar}" method="post" class="cancelar-form" th:if="${reserva.estado == 'Confirmada'}">
                        <input type="hidden" name="idReserva" th:value="${reserva.idReserva}">
                        <button type="submit" class="btn-cancelar">
                            <i class="fas fa-times-circle"></i> Cancelar reserva
                        </button>
                    </form>
                </div>
            </div>

            <!-- Estado vacío -->
            <div th:if="${#lists.isEmpty(reservas)}" class="empty-state">
                <i class="fas fa-calendar-times"></i>
                <p>No tienes reservas aún</p>
                <a th:href="@{/usuario/clases}" class="btn-primary-small">Explorar clases</a>
            </div>

        </main>
    </div>

    <!-- FOOTER (fragmento) -->
    <div th:replace="fragments/footer :: footerGlobal"></div>

    <!-- MODAL DE CONFIRMACIÓN PARA CANCELAR -->
    <div id="cancelModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fas fa-exclamation-triangle"></i> Cancelar reserva</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-detail" id="modalDetails">
                    <!-- Los datos se llenan dinámicamente -->
                </div>
                <div class="modal-question">
                    ¿Estás seguro de que deseas cancelar esta reserva?
                </div>
                <div class="modal-warning">
                    <i class="fas fa-info-circle"></i> Esta acción no se puede deshacer.
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="cancelModalBtn">No, mantener</button>
                <button class="modal-btn modal-btn-confirm-cancel" id="confirmModalBtn">Sí, cancelar reserva</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ========== NOTIFICACIONES (si el navbar no las incluye) ==========
            const notifBtn = document.getElementById('notifBtn');
            const notifDropdown = document.getElementById('notifDropdown');
            if (notifBtn && notifDropdown) {
                notifBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    notifDropdown.classList.toggle('show');
                });
                document.addEventListener('click', (e) => {
                    if (!notifBtn.contains(e.target) && !notifDropdown.contains(e.target)) {
                        notifDropdown.classList.remove('show');
                    }
                });
            }

            // ========== SIDEBAR MÓVIL ==========
            const menuToggle = document.getElementById('menuToggleBtn');
            const sidebar = document.querySelector('.sidebar');
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    sidebar.classList.toggle('active');
                });
                document.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                            sidebar.classList.remove('active');
                        }
                    }
                });
                window.addEventListener('resize', () => {
                    if (window.innerWidth > 768) sidebar.classList.remove('active');
                });
            }

            // ========== MODAL DE CONFIRMACIÓN PARA CANCELAR ==========
            const modal = document.getElementById('cancelModal');
            const modalDetails = document.getElementById('modalDetails');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const cancelModalBtn = document.getElementById('cancelModalBtn');
            const confirmModalBtn = document.getElementById('confirmModalBtn');
            let currentForm = null;

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function openModal(formElement) {
                const card = formElement.closest('.reserva-card');
                if (!card) return;

                // Extraer datos de la tarjeta
                const nombreClase = card.querySelector('.reserva-header h3')?.innerText || 'Clase';
                const coach = card.querySelector('.reserva-info strong')?.innerText || '';
                const fecha = card.querySelector('.reserva-info:nth-of-type(2) span')?.innerText || '';
                const hora = card.querySelector('.reserva-info:nth-of-type(3) span')?.innerText || '';

                modalDetails.innerHTML = `
                    <p><i class="fas fa-dumbbell"></i> <strong>${escapeHtml(nombreClase)}</strong></p>
                    <p><i class="fas fa-chalkboard-user"></i> Coach: ${escapeHtml(coach)}</p>
                    <p><i class="fas fa-calendar-day"></i> Fecha: ${escapeHtml(fecha)}</p>
                    <p><i class="fas fa-clock"></i> Hora: ${escapeHtml(hora)}</p>
                `;
                currentForm = formElement;
                modal.classList.add('active');
            }

            function closeModal() {
                modal.classList.remove('active');
                currentForm = null;
            }

            function confirmCancel() {
                if (currentForm) {
                    currentForm.submit();
                }
                closeModal();
            }

            closeModalBtn.addEventListener('click', closeModal);
            cancelModalBtn.addEventListener('click', closeModal);
            confirmModalBtn.addEventListener('click', confirmCancel);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            // Interceptar todos los formularios de cancelación
            const cancelForms = document.querySelectorAll('.cancelar-form');
            cancelForms.forEach(form => {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    openModal(form);
                });
            });
        });
    </script>

</body>
</html>
