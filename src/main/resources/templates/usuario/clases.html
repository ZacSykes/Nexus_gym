<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Clases Disponibles</title>
    <link rel="stylesheet" th:href="@{/css/ClasesDisponibles.css}">
</head>

<body>

    <!-- NAVBAR -->
    <div th:replace="usuario/fragments/navbar :: navbarUsuario"></div>

    <div class="main-layout">

        <!-- SIDEBAR -->
        <div th:replace="usuario/fragments/sidebar :: sidebarUsuario"></div>

        <!-- CONTENIDO -->
        <main class="main-content">

            <!-- MENSAJES -->
            <div th:if="${mensaje}" 
                 th:classappend="${tipo == 'exito'} ? 'alert-exito' : 'alert-error'"
                 style="padding:12px; border-radius:8px; margin-bottom:15px; text-align:center;">
                <span th:text="${mensaje}"></span>
            </div>

            <div class="section-header">
                <h1>🥊 Clases Disponibles</h1>
                <p>Encuentra tu próxima clase y reserva tu lugar</p>
            </div>

            <!-- PAQUETE ACTIVO -->
            <div class="paquete-resumen" th:if="${paquete != null}">
                <div class="paquete-info">
                    <span class="paquete-icon">🛡️</span>
                    <div class="paquete-detalle">
                        <span class="paquete-label">Tu plan actual</span>
                        <span class="paquete-nombre" th:text="${paquete.totalClases + ' clases'}"></span>
                    </div>
                </div>
                <div class="clases-restantes">
                    <span class="restantes-numero" th:text="${paquete.clasesRestantes}"></span>
                    <span class="restantes-label">clases restantes</span>
                </div>
                <div class="vencimiento">
                    <span>📅 Vence: 
                        <strong th:text="${#temporals.format(paquete.fechaVencimiento, 'dd/MM/yyyy')}"></strong>
                    </span>
                </div>
                <a th:href="@{/usuario/paquetes}" class="btn-comprar">🔄 Recargar plan</a>
            </div>

            <!-- FILTROS -->
            <form th:action="@{/usuario/clases}" method="get">
                <div class="filters-bar">

                    <div class="filter-group">
                        <label>🥋 Disciplina</label>
                        <select class="filter-select" name="disciplina">
                            <option value="todas">Todas</option>
                            <option value="Boxeo">🥊 Boxeo</option>
                            <option value="Muay Thai">🦵 Muay Thai</option>
                            <option value="MMA">🔥 MMA</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>📊 Nivel</label>
                        <select class="filter-select" name="nivel">
                            <option value="todos">Todos</option>
                            <option value="Principiante">Principiante</option>
                            <option value="Intermedio">Intermedio</option>
                            <option value="Avanzado">Avanzado</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-buscar">🔍 Buscar</button>
                    <a th:href="@{/usuario/clases}" class="btn-limpiar-filtros">🗑️ Limpiar</a>

                </div>
            </form>

            <!-- RESULTADOS -->
            <div class="resultados-header">
                <span th:text="'Mostrando ' + ${#lists.size(clases)} + ' clases disponibles'"></span>
            </div>

            <!-- GRID -->
            <div class="clases-grid">

                <div th:each="clase : ${clases}" class="clase-card">

                    <h3 th:text="${clase.nombre}"></h3>

                    <p th:text="'Coach: ' + ${clase.profesor.nombre}"></p>

                    <p th:text="${clase.diaSemana} + ' - ' + ${clase.horaInicio}"></p>

                    <form th:action="@{/usuario/reservar}" method="post">
                        <input type="hidden" name="idClase" th:value="${clase.idClases}">
                        <button type="submit" th:disabled="${paquete == null}">
                            Reservar
                        </button>
                    </form>

                </div>

                <div th:if="${#lists.isEmpty(clases)}">
                    <p>No hay clases disponibles</p>
                </div>

            </div>

        </main>
    </div>

    <!-- FOOTER -->
    <div th:replace="fragments/footer :: footerGlobal"></div>

   <script>
    document.querySelectorAll('.fecha-input').forEach(input => {
        const diaSemanaClase = input.getAttribute('data-dia-semana');
        const form = input.closest('.clase-card').querySelector('.reserva-form');
        const hiddenFecha = form.querySelector('.fecha-hidden');

        input.addEventListener('change', function() {
            if (this.value) {
                // Parsear la fecha en la zona horaria local
                const [year, month, day] = this.value.split('-');
                const selectedDate = new Date(year, month - 1, day); // ¡importante: month-1!
                const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const diaSemanaSeleccionado = diasSemana[selectedDate.getDay()];

                // Normalizar para comparación (minúsculas, sin tildes)
                const normalizar = (str) => {
                    return str.trim().toLowerCase()
                        .replace(/á/g, 'a')
                        .replace(/é/g, 'e')
                        .replace(/í/g, 'i')
                        .replace(/ó/g, 'o')
                        .replace(/ú/g, 'u')
                        .replace(/ü/g, 'u')
                        .replace(/ñ/g, 'n');
                };

                const diaClaseNorm = normalizar(diaSemanaClase);
                const diaSeleccionadoNorm = normalizar(diaSemanaSeleccionado);

                if (diaClaseNorm !== diaSeleccionadoNorm) {
                    alert(`La clase solo se imparte los ${diaSemanaClase}. Por favor, elige una fecha que sea ${diaSemanaClase}.`);
                    this.value = '';
                    hiddenFecha.value = '';
                } else {
                    hiddenFecha.value = this.value;
                }
            } else {
                hiddenFecha.value = '';
            }
        });
    });
</script>
</body>
</html>
