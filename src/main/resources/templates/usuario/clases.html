<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Clases Disponibles</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/ClasesDisponibles.css}">
</head>

<body>

<header class="navbar">
    <div class="nav-container">
        <div class="logo-nav">
            <button class="menu-toggle" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
            </button>
            <img th:src="@{/imagenes/Nexus.png}" class="logo-img">
            <span class="logo-text">NEXUS</span>
        </div>

        <div class="nav-actions">

            <!-- Notificaciones -->
            <div class="notifications-wrapper">
                <button class="icon-btn notif-btn" id="notifBtn">
                    <i class="fas fa-bell"></i>
                </button>

                <span class="notif-badge"
                      th:text="${notificacionesNoLeidas != null ? notificacionesNoLeidas : 0}">0</span>

                <div class="notif-dropdown" id="notifDropdown">
                    <div class="notif-header">
                        <span>Notificaciones</span>
                        <a th:href="@{/usuario/notificaciones}">Ver todas</a>
                    </div>
                    <div class="notif-list">
                        <div class="notif-empty">
                            <i class="fas fa-bell-slash"></i>
                            <span>No hay notificaciones</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Usuario -->
            <div class="user-menu" th:if="${usuario != null}">
                <span th:text="${usuario.nombre + ' ' + usuario.apellido}"></span>

                <form th:action="@{/logout}" method="post">
                    <button type="submit">Salir</button>
                </form>
            </div>

        </div>
    </div>
</header>

<div class="main-layout">

    <!-- Sidebar -->
    <div th:replace="usuario/fragments/sidebar :: sidebarUsuario"></div>

    <main class="main-content">

        <!-- MENSAJES -->
        <div th:if="${mensaje}" class="alert-message">
            <span th:text="${mensaje}"></span>
        </div>

        <!-- HEADER -->
        <div class="page-header">
            <h1>Clases Disponibles</h1>
        </div>

        <!-- PLAN -->
        <div th:if="${paquete != null}">
            <p>
                Clases restantes:
                <strong th:text="${paquete.clasesRestantes}"></strong>
            </p>
        </div>

        <!-- RESULTADOS -->
        <div class="results-header"
             th:if="${clasesSemana != null}">
            Mostrando
            <strong th:text="${#lists.size(clasesSemana)}"></strong>
            clases
        </div>

        <!-- LISTA DE CLASES -->
        <div class="clases-grid"
             th:if="${clasesSemana != null and !clasesSemana.isEmpty()}">

            <div th:each="item : ${clasesSemana}" class="clase-card">

                <h3 th:text="${item.clase.nombre}"></h3>

                <p th:text="${item.clase.nivel}"></p>

                <p>
                    Coach:
                    <strong th:text="${item.clase.profesor.nombre}"></strong>
                </p>

                <p>
                    <span th:text="${item.clase.diaSemana}"></span> -
                    <span th:text="${#temporals.format(item.clase.horaInicio, 'hh:mm a')}"></span>
                </p>

                <p>
                    Fecha:
                    <span th:text="${#temporals.format(item.fecha, 'dd/MM/yyyy')}"></span>
                </p>

                <!-- FORM RESERVA -->
                <form th:action="@{/usuario/reservar}" method="post">

                    <input type="hidden" name="idClase"
                           th:value="${item.clase.idClases}">

                    <input type="hidden" name="fechaClase"
                           th:value="${#temporals.format(item.fecha, 'yyyy-MM-dd')}">

                    <button type="submit"
                            th:disabled="${paquete == null}">
                        <i class="fas fa-calendar-check"></i> Reservar
                    </button>

                </form>

            </div>

        </div>

        <!-- VACÍO -->
        <div th:if="${clasesSemana == null or clasesSemana.isEmpty()}">
            <p>No hay clases disponibles</p>
        </div>

    </main>

</div>

</body>
</html>

    <!-- FOOTER (fragmento) -->
    <div th:replace="fragments/footer :: footerGlobal"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Toggle notificaciones
            const notifBtn = document.getElementById('notifBtn');
            const notifDropdown = document.getElementById('notifDropdown');
            if (notifBtn && notifDropdown) {
                notifBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    notifDropdown.classList.toggle('show');
                });
                document.addEventListener('click', (e) => {
                    if (!notifBtn.contains(e.target) && !notifDropdown.contains(e.target)) {
                        notifDropdown.classList.remove('show');
                    }
                });
            }

            // Toggle sidebar móvil
            const menuToggle = document.getElementById('menuToggleBtn');
            const sidebar = document.querySelector('.sidebar');
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    sidebar.classList.toggle('active');
                });
                document.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                            sidebar.classList.remove('active');
                        }
                    }
                });
                window.addEventListener('resize', () => {
                    if (window.innerWidth > 768) sidebar.classList.remove('active');
                });
            }
        });
    </script>
</body>
</html>
