<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Clases Disponibles</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/ClasesDisponibles.css}">
</head>

<body>

<header class="navbar">
    <div class="nav-container">
        <div class="logo-nav">
            <button class="menu-toggle" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
            </button>
            <img th:src="@{/imagenes/Nexus.png}" class="logo-img">
            <span class="logo-text">NEXUS</span>
        </div>

        <div class="nav-actions">
            <div class="notifications-wrapper">
                <button class="icon-btn notif-btn" id="notifBtn">
                    <i class="fas fa-bell"></i>
                </button>
                <span class="notif-badge" th:text="${notificacionesNoLeidas != null ? notificacionesNoLeidas : 0}">0</span>
                <div class="notif-dropdown" id="notifDropdown">
                    <div class="notif-header">
                        <span>Notificaciones</span>
                        <a th:href="@{/usuario/notificaciones}">Ver todas</a>
                    </div>
                    <div class="notif-list">
                        <div class="notif-empty">
                            <i class="fas fa-bell-slash"></i>
                            <span>No hay notificaciones</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="user-menu" th:if="${usuario != null}">
                <span th:text="${usuario.nombre + ' ' + usuario.apellido}"></span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit">Salir</button>
                </form>
            </div>
        </div>
    </div>
</header>

<div class="main-layout">
    <div th:replace="usuario/fragments/sidebar :: sidebarUsuario"></div>

    <main class="main-content">
        <div th:if="${mensaje}" class="alert-message">
            <span th:text="${mensaje}"></span>
        </div>

        <div class="page-header">
            <h1>Clases Disponibles</h1>
        </div>

        <div th:if="${paquete != null}">
            <p>Clases restantes: <strong th:text="${paquete.clasesRestantes}"></strong></p>
        </div>

        <div class="results-header" th:if="${clasesSemana != null}">
            Mostrando <strong th:text="${#lists.size(clasesSemana)}"></strong> clases
        </div>

        <div class="clases-grid" th:if="${clasesSemana != null and !clasesSemana.isEmpty()}">
            <div th:each="item : ${clasesSemana}" class="clase-card" data-clase-id="${item.clase.idClases}">
                <h3 th:text="${item.clase.nombre}"></h3>
                <p th:text="${item.clase.nivel}"></p>
                <p>Coach: <strong th:text="${item.clase.profesor.nombre}"></strong></p>
                <p><span th:text="${item.clase.diaSemana}"></span> - <span th:text="${#temporals.format(item.clase.horaInicio, 'hh:mm a')}"></span></p>
                <p>Fecha: <span th:text="${#temporals.format(item.fecha, 'dd/MM/yyyy')}"></span></p>

                <form th:action="@{/usuario/reservar}" method="post" class="reserva-form">
                    <input type="hidden" name="idClase" th:value="${item.clase.idClases}">
                    <input type="hidden" name="fechaClase" th:value="${#temporals.format(item.fecha, 'yyyy-MM-dd')}">
                    <button type="submit" th:disabled="${paquete == null}">
                        <i class="fas fa-calendar-check"></i> Reservar
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${clasesSemana == null or clasesSemana.isEmpty()}">
            <p>No hay clases disponibles</p>
        </div>
    </main>
</div>

<div th:replace="fragments/footer :: footerGlobal"></div>

<!-- MODAL DE CONFIRMACIÓN -->
<div id="confirmModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3><i class="fas fa-question-circle"></i> Confirmar reserva</h3>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-detail" id="modalDetails"></div>
            <div class="modal-question">¿Estás seguro de reservar esta clase?</div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn modal-btn-cancel" id="cancelModalBtn">Cancelar</button>
            <button class="modal-btn modal-btn-confirm" id="confirmModalBtn">Sí, reservar</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Notificaciones
        const notifBtn = document.getElementById('notifBtn');
        const notifDropdown = document.getElementById('notifDropdown');
        if (notifBtn && notifDropdown) {
            notifBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                notifDropdown.classList.toggle('show');
            });
            document.addEventListener('click', (e) => {
                if (!notifBtn.contains(e.target) && !notifDropdown.contains(e.target)) {
                    notifDropdown.classList.remove('show');
                }
            });
        }

        // Sidebar móvil
        const menuToggle = document.getElementById('menuToggleBtn');
        const sidebar = document.querySelector('.sidebar');
        if (menuToggle && sidebar) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('active');
            });
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                    if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                        sidebar.classList.remove('active');
                    }
                }
            });
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) sidebar.classList.remove('active');
            });
        }

        // Modal de confirmación
        const modal = document.getElementById('confirmModal');
        const modalDetails = document.getElementById('modalDetails');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const confirmModalBtn = document.getElementById('confirmModalBtn');
        let currentForm = null;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function openModal(formElement) {
            const card = formElement.closest('.clase-card');
            if (!card) return;
            const nombre = card.querySelector('h3')?.innerText || 'Clase';
            const nivel = card.querySelector('p:nth-of-type(1)')?.innerText || '';
            const coach = card.querySelector('p:nth-of-type(2) strong')?.innerText || '';
            const diaHora = card.querySelector('p:nth-of-type(3)')?.innerText || '';
            const fechaSpan = card.querySelector('p:nth-of-type(4) span')?.innerText || '';
            modalDetails.innerHTML = `
                <p><i class="fas fa-dumbbell"></i> <strong>${escapeHtml(nombre)}</strong> (${escapeHtml(nivel)})</p>
                <p><i class="fas fa-chalkboard-user"></i> Coach: ${escapeHtml(coach)}</p>
                <p><i class="fas fa-calendar-week"></i> ${escapeHtml(diaHora)}</p>
                <p><i class="fas fa-calendar-day"></i> Fecha: ${escapeHtml(fechaSpan)}</p>
            `;
            currentForm = formElement;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            currentForm = null;
        }

        function confirmReservation() {
            if (currentForm) currentForm.submit();
            closeModal();
        }

        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);
        confirmModalBtn.addEventListener('click', confirmReservation);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        const forms = document.querySelectorAll('.reserva-form');
        forms.forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = form.querySelector('button');
                if (btn && btn.disabled) return;
                openModal(form);
            });
        });
    });
</script>

</body>
</html>
